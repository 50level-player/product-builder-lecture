<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 신비 손금 - Gemini Palmistry</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Generative AI SDK -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body>
    <div class="mystic-bg"></div>
    <div class="container">
        <header>
            <h1>✨ AI 신비 손금 ✨</h1>
            <p class="subtitle">당신의 오른손 손금에 담긴 운명을 Gemini가 읽어드립니다.</p>
        </header>

        <div class="api-key-section" id="api-key-area">
            <input type="password" id="api-key" placeholder="Gemini API Key를 입력하세요">
            <p class="hint"><a href="https://aistudio.google.com/app/apikey" target="_blank">여기서 API Key를 발급받을 수 있습니다.</a></p>
        </div>

        <div class="game-container">
            <div class="webcam-box">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="capture-canvas" style="display:none;"></canvas>
                <div class="guide-overlay">
                    <div class="palm-guide"></div>
                </div>
            </div>

            <div class="controls">
                <button id="capture-btn" class="mystic-btn">🔮 손금 분석하기</button>
                <button id="retry-btn" class="mystic-btn hidden">🔄 다시 찍기</button>
            </div>
        </div>

        <div id="loading" class="hidden">
            <div class="loader"></div>
            <p>운명의 지도를 분석 중입니다...</p>
        </div>

        <div id="result-area" class="result-card hidden">
            <h2>📜 분석 결과</h2>
            <div id="analysis-text" class="analysis-content"></div>
            <div class="disclaimer">※ 본 결과는 AI의 분석이며 재미로만 참고해 주세요.</div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
