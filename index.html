<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 나는 강아지? 고양이?</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐶 AI 동물상 테스트 🐱</h1>
            <p class="subtitle">인공지능이 분석하는 나의 숨겨진 동물상 찾기</p>
        </header>

        <div class="test-area">
            <div id="webcam-container" class="webcam-box">
                <div id="loading-spinner" class="hidden">
                    <div class="loader"></div>
                    <p>AI 모델 로딩 중...</p>
                </div>
            </div>
            
            <div id="result-container" class="result-box hidden">
                <h2 id="animal-title">분석 결과</h2>
                <div id="label-container" class="label-list"></div>
                <p id="animal-desc" class="animal-description"></p>
            </div>
        </div>

        <div class="controls">
            <button type="button" id="start-btn" class="main-btn">✨ 테스트 시작하기</button>
            <button type="button" id="retry-btn" class="main-btn hidden">🔄 다시 하기</button>
        </div>

        <footer class="footer">
            <p>© 2026 AI Animal Face Test. Powered by Teachable Machine</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
