<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 행운의 예언가 - 오늘의 운세 & 로또</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div class="container">
        <header>
            <h1>🌟 AI 행운의 예언가 🌟</h1>
            <p class="subtitle">오늘 당신을 기다리는 운명과 행운의 숫자를 확인하세요.</p>
        </header>

        <div class="auth-section">
            <div id="user-info" class="hidden">
                <img id="user-photo" src="" alt="Profile">
                <span id="user-name"></span>님 환영합니다!
                <button id="logout-btn" class="text-btn">로그아웃</button>
            </div>
            <button id="google-login-btn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Google 계정으로 시작하기
            </button>
        </div>

        <div id="input-area" class="input-card hidden">
            <div class="form-group">
                <label for="user-birth">생년월일</label>
                <input type="date" id="user-birth" required>
            </div>
            <div class="form-group">
                <label for="user-real-name">이름</label>
                <input type="text" id="user-real-name" placeholder="이름을 입력하세요" required>
            </div>
            <button id="predict-btn" class="lucky-btn">🍀 행운의 결과 보기</button>
        </div>

        <div id="loading" class="hidden">
            <div class="loader"></div>
            <p>별들의 움직임을 분석 중입니다...</p>
        </div>

        <div id="result-area" class="hidden">
            <div class="fortune-card">
                <h2>📜 오늘의 운세</h2>
                <div id="fortune-text" class="content"></div>
            </div>

            <div class="lotto-card">
                <h2>💎 행운의 로또 번호</h2>
                <div id="lotto-results" class="lotto-container"></div>
            </div>
            
            <button id="retry-btn" class="lucky-btn">🔄 다시 점치기</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
