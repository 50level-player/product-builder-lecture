<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <h1 id="main-title">🤖 AI 가위바위보</h1>
            <div class="theme-toggle">
                <button id="theme-btn">🌙 Dark Mode</button>
            </div>
        </div>

        <div class="game-area">
            <div class="webcam-container">
                <div id="webcam-wrapper"></div>
                <div id="countdown" class="hidden">3</div>
                <div class="label-overlay">
                    <span id="user-prediction">Ready...</span>
                </div>
            </div>

            <div class="vs-divider">VS</div>

            <div class="computer-container">
                <div id="computer-choice" class="choice-icon">❓</div>
                <div class="label-overlay">
                    <span>Computer</span>
                </div>
            </div>
        </div>

        <div class="result-area">
            <h2 id="game-result">Press Start!</h2>
            <div class="score-board">
                <div class="score">User: <span id="user-score">0</span></div>
                <div class="score">AI: <span id="comp-score">0</span></div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="primary-btn">🎮 Game Start!</button>
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h3>🤝 Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mbdzgnwe" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
