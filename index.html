<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flavor Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 Dark Mode</button>
        </div>
        <h1>🍽️ World Cuisine</h1>
        <p class="subtitle">Select a cuisine category!</p>
        
        <div class="category-buttons">
            <button class="cat-btn" data-category="korean">🇰🇷 Korean</button>
            <button class="cat-btn" data-category="western">🍔 Western</button>
            <button class="cat-btn" data-category="japanese">🍣 Japanese</button>
        </div>

        <div id="menu-display" class="menu-card hidden">
            <div class="image-container">
                <img id="dish-img" src="" alt="Dish Image">
            </div>
            <div class="content-area">
                <div class="menu-header">
                    <span class="menu-icon" id="dish-icon">❓</span>
                    <h2 class="menu-name" id="dish-name">Dish Name</h2>
                </div>
                <p class="menu-desc" id="dish-desc">Simple description goes here.</p>
            </div>
        </div>
        
        <div id="placeholder" class="placeholder-card">
            <p>Click a category to see a recommendation!</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
