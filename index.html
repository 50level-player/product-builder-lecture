<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 Dark Mode</button>
        </div>
        <h1>🍽️ Today's Menu?</h1>
        <p class="subtitle">Choose a meal time for a recommendation!</p>
        
        <div class="meal-buttons">
            <button class="meal-btn" data-meal="breakfast">🌅 Breakfast</button>
            <button class="meal-btn" data-meal="lunch">☀️ Lunch</button>
            <button class="meal-btn" data-meal="dinner">🌙 Dinner</button>
        </div>

        <div id="menu-display" class="menu-card">
            <div class="menu-icon">❓</div>
            <div class="menu-name">Click a button!</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
